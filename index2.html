<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Lật ảnh đoán địa danh</title>

<style>

body{

font-family:Arial;

background:#efe3c6;

text-align:center;

padding:20px;

}

h1{

color:#7a1010;

}

#game{

width:350px;

height:350px;

margin:auto;

position:relative;

border:5px solid #7a1010;

overflow:hidden;

}

img{

width:100%;

height:100%;

object-fit:cover;

}

.block{

position:absolute;

background:#5f3d25;

border:2px solid gold;

display:flex;

align-items:center;

justify-content:center;

font-size:30px;

font-weight:bold;

color:white;

transition:0.5s;

}

.hide{

opacity:0;

pointer-events:none;

}

button{

display:block;

width:100%;

padding:10px;

margin:7px;

border:none;

background:#7a1010;

color:white;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#b11d1d;

}

#box{

background:white;

padding:15px;

margin-top:15px;

border-radius:12px;

max-width:850px;

margin-left:auto;

margin-right:auto;

}

#finish{

display:none;

font-size:24px;

font-weight:bold;

color:#7a1010;

margin-top:20px;

}

#message{

font-weight:bold;

margin:10px;

}

</style>

</head>

<body>

<h1>🏛️ LẬT ẢNH ĐOÁN ĐỊA DANH</h1>

<div id="game">

<img src="https://upload.wikimedia.org/wikipedia/commons/0/06/Imperial_Citadel_of_Thang_Long.jpg">

<div id="b1" class="block"
style="left:0;top:0;width:50%;height:33%">?</div>

<div id="b2" class="block"
style="right:0;top:0;width:50%;height:33%">?</div>

<div id="b3" class="block"
style="left:0;top:33%;width:100%;height:34%">?</div>

<div id="b4" class="block"
style="left:0;bottom:0;width:50%;height:33%">?</div>

<div id="b5" class="block"
style="right:0;bottom:0;width:50%;height:33%">?</div>

</div>

<div id="box">

<h3 id="question"></h3>

<div id="answers"></div>

<div id="message"></div>

</div>

<div id="finish">

🎉 Hoàn thành

<br><br>

Đây là địa danh nổi tiếng nào?

<br><br>

🏛️ HOÀNG THÀNH THĂNG LONG

</div>

<script>

const data=[

{

q:"Câu 1. Theo tư tưởng Hồ Chí Minh về mục đích cốt lõi của Cách mạng Việt Nam, hai giai đoạn Cách mạng xã hội chủ nghĩa và Cách mạng cộng sản chủ nghĩa có những điểm giống nhau căn bản nào?",

a:[

"A", Xã hội hoàn toàn không còn bất kỳ vết tích hay tàn dư nào của xã hội cũ để lại.

"B", Sức sản xuất đã phát triển cao; Tư liệu sản xuất là của chung; Không có giai cấp áp bức, bóc lột.

"C", Áp dụng triệt để nguyên tắc phân phối sản phẩm theo nhu cầu tự nhiên của con người.

"D" Sự đồng nhất hoàn toàn về trình độ giác ngộ và lối sống của mọi thành viên xã hội.

],

d:1

},

{

q:"Câu 2. Khi giải thích về quy luật tiến lên chủ nghĩa xã hội của nhân loại, Hồ Chí Minh có luận điểm: "Có nước đi thẳng đến CNXH... có nước thì phải kinh qua chế độ dân chủ mới...". Bản chất của "Chế độ dân chủ mới" theo giải thích của Người là gì?",

a:[
  
"A", Chế độ đặt dưới sự lãnh đạo của Đảng Cộng sản, nhằm đánh đổ đế quốc, phong kiến, nhân dân lao động làm chủ.

"B", Một hình thái quá độ trung gian, nơi các đảng phái tư sản và vô sản cùng chia sẻ quyền lực chính trị.

"C",  Mô hình kinh tế thị trường tự do hoàn toàn trước khi nhà nước tiến hành quốc hữu hóa tư liệu sản xuất.

"D" Giai đoạn duy trì nền quân chủ lập hiến tạm thời để ổn định trật tự xã hội sau chiến tranh.

],

d:0

},

{

q:"Câu 3. Điểm khác biệt nhân văn?",

a:[

"A",

"B",

"C",

"D"

],

d:2

},

{

q:"Câu 4. Vì sao thời kỳ quá độ khó hơn đánh giặc?",

a:[

"A",

"B",

"C",

"D"

],

d:0

},

{

q:"Câu 5. Vi trùng độc hại cần chống?",

a:[

"A",

"B",

"C",

"D"

],

d:1

}

];

let current=0;

let opened=0;

load();

function load(){

if(current>=5){

document
.getElementById("box")
.style.display="none";

document
.getElementById("finish")
.style.display="block";

return;

}

let q=data[current];

document
.getElementById("question")
.innerHTML=q.q;

let html="";

q.a.forEach((x,i)=>{

html+=

`<button onclick="check(${i})">

${x}

</button>`;

});

document
.getElementById("answers")
.innerHTML=html;

}

function check(choice){
  if(choice===data[current].d){

opened++;

document
.getElementById(
"b"+opened
)
.classList.add("hide");

document
.getElementById("message")
.innerHTML=

"✅ Chính xác";

current++;

setTimeout(()=>{

document
.getElementById("message")
.innerHTML="";

load();

},700);

}

else{

document
.getElementById("message")
.innerHTML=

"❌ Sai rồi, thử lại";

}

}

</script>

</body>

</html>
